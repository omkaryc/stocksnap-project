server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/stocksnapdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    secret: 12345678901234567890123456789012stocksnapsecretkey
    expiration-ms: 86400000
